name: Test Artifacts
description: Dump test databases and upload test artifacts.

inputs:
  artifact_name:
    description: Artifact name to upload.
    required: true
  log_dir:
    description: Directory containing test logs and database dumps.
    required: true
  cargo_output_logs:
    description: "Space-separated cargo output log files used to detect failed tests."
    required: false
    default: ""
  upload:
    description: "Upload mode: failed uploads cargo output logs and db dumps, all uploads log_dir too."
    required: false
    default: failed
  dump:
    description: "Database dump mode: failed, all, or none."
    required: false
    default: failed
  retention_days:
    description: Artifact retention in days.
    required: false
    default: "7"

runs:
  using: composite
  steps:
    - name: Dump failed test databases
      if: ${{ always() && inputs.dump == 'failed' && inputs.cargo_output_logs != '' }}
      continue-on-error: true
      shell: bash
      run: ./scripts/dump_failed_test_dbs.sh "${{ inputs.log_dir }}" ${{ inputs.cargo_output_logs }}

    - name: Dump all test databases
      if: ${{ always() && inputs.dump == 'all' }}
      continue-on-error: true
      shell: bash
      run: |
        mkdir -p "${{ inputs.log_dir }}"
        docker run --rm --network host -e PGPASSWORD=clementine postgres:latest \
          pg_dumpall -h localhost -p 5432 -U clementine --exclude-database=postgres --clean --if-exists \
          > "${{ inputs.log_dir }}/db_dump.sql"

    - name: Resolve upload path
      if: ${{ always() }}
      id: upload-path
      shell: bash
      run: |
        cargo_output_logs="${{ inputs.cargo_output_logs }}"

        {
          echo "path<<EOF"
          if [[ "${{ inputs.upload }}" == "all" ]]; then
            echo "${{ inputs.log_dir }}/"
          fi

          for log in ${cargo_output_logs}; do
            echo "${log}"
          done

          echo "${{ inputs.log_dir }}/db_dump_*.sql"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Upload test artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ steps.upload-path.outputs.path }}
        if-no-files-found: ignore
        retention-days: ${{ inputs.retention_days }}
