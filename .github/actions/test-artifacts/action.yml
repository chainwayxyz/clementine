name: Test Artifacts
description: Copy test output logs, dump test databases, and upload test artifacts.

inputs:
  artifact_name:
    description: Artifact name to upload.
    required: true
  log_dir:
    description: Root directory for this uploaded test artifact.
    required: true
  cargo_output_logs:
    description: "Space-separated cargo output log files used to detect failed tests."
    required: false
    default: ""
  dump:
    description: "Database dump mode: failed, all, or none."
    required: false
    default: failed
  retention_days:
    description: Artifact retention in days.
    required: false
    default: "7"

runs:
  using: composite
  steps:
    - name: Dump failed test databases
      if: ${{ always() && inputs.dump == 'failed' && inputs.cargo_output_logs != '' }}
      continue-on-error: true
      shell: bash
      run: ./scripts/dump_failed_test_dbs.sh "${{ inputs.log_dir }}/dumps" ${{ inputs.cargo_output_logs }}

    - name: Dump all test databases
      if: ${{ always() && inputs.dump == 'all' }}
      continue-on-error: true
      shell: bash
      run: |
        mkdir -p "${{ inputs.log_dir }}/dumps"
        docker run --rm --network host -e PGPASSWORD=clementine postgres:latest \
          pg_dumpall -h localhost -p 5432 -U clementine --exclude-database=postgres --clean --if-exists \
          > "${{ inputs.log_dir }}/dumps/db_dump.sql"

    - name: Copy cargo output logs
      if: ${{ always() }}
      shell: bash
      run: |
        mkdir -p "${{ inputs.log_dir }}"
        cargo_output_logs="${{ inputs.cargo_output_logs }}"

        for log in ${cargo_output_logs}; do
          if [[ ! -f "${log}" ]]; then
            echo "Cargo output log not found, skipping: ${log}"
            continue
          fi

          dest="${{ inputs.log_dir }}/$(basename "${log}")"
          if [[ "$(realpath -m "${log}")" == "$(realpath -m "${dest}")" ]]; then
            continue
          fi

          cp "${log}" "${dest}"
        done

    - name: Upload test artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ inputs.log_dir }}/
        if-no-files-found: ignore
        retention-days: ${{ inputs.retention_days }}
