syntax = "proto3";
package clementine;

message Empty {}

message Txid { bytes txid = 1; }

message Outpoint {
  Txid txid = 1;
  uint32 vout = 2;
}

message Outpoints { repeated Outpoint outpoints = 1; }

message NofnResponse {
  bytes nofn_xonly_pk = 1;
  uint32 num_verifiers = 2;
}

message DepositSignatures { repeated TaggedSignature signatures = 1; }

message ChallengeACKDigest { bytes hash = 1; }

message WinternitzPubkey { repeated bytes digit_pubkey = 3; }

message DepositParams {
  Deposit deposit = 1;
  Actors actors = 2;
  SecurityCouncil security_council = 3;
}

message SecurityCouncil {
  repeated bytes pks = 1;
  uint32 threshold = 2;
}

message Deposit {
  /// User's deposit UTXO.
  Outpoint deposit_outpoint = 1;
  oneof deposit_data {
    BaseDeposit base_deposit = 2;
    ReplacementDeposit replacement_deposit = 3;
  }
}

message Actors {
  /// Public keys of verifiers that will participate in the deposit.
  VerifierPublicKeys verifiers = 1;
  /// X-only public keys of watchtowers that will participate in the deposit.
  /// NOTE: verifiers are automatically considered watchtowers. This field is
  /// only for additional watchtowers.
  XOnlyPublicKeys watchtowers = 2;
  /// X-only public keys of operators that will participate in the deposit.
  XOnlyPublicKeys operators = 3;
}

message ReplacementDeposit {
  // Move to vault txid that is being replaced.
  Txid old_move_txid = 1;
}

// A new original deposit request's details.
message BaseDeposit {
  // User's EVM address.
  bytes evm_address = 1;
  // User's recovery taproot address.
  string recovery_taproot_address = 2;
}

enum FeeType {
  UNSPECIFIED = 0;
  CPFP = 1;
  RBF = 2;
  NO_FUNDING = 3;
  RBF_WTXID_GRIND = 4;
}

enum TransactionType {
  UNSPECIFIED_TRANSACTION_TYPE = 0;
  MOVE_TO_VAULT = 1;
  EMERGENCY_STOP = 2;
  ROUND = 3;
  READY_TO_REIMBURSE = 4;
  KICKOFF = 5;
  CHALLENGE = 6;
  CHALLENGE_TIMEOUT = 7;
  KICKOFF_NOT_FINALIZED = 8;
  WATCHTOWER_CHALLENGE = 9;
  WATCHTOWER_CHALLENGE_TIMEOUT = 10;
  OPERATOR_CHALLENGE_NACK = 11;
  OPERATOR_CHALLENGE_ACK = 12;
  LATEST_BLOCKHASH = 13;
  LATEST_BLOCKHASH_TIMEOUT = 14;
  MINI_ASSERT = 15;
  ASSERT_TIMEOUT = 16;
  DISPROVE = 17;
  DISPROVE_TIMEOUT = 18;
  UNSPENT_KICKOFF = 19;
  BURN_UNUSED_KICKOFF_CONNECTORS = 20;
  REIMBURSE = 21;
  PAYOUT = 22;
  OPTIMISTIC_PAYOUT = 23;
  REPLACEMENT_DEPOSIT = 24;
  YIELD_KICKOFF_TXID = 25;
}

message TransactionId {
  TransactionType transaction_type = 1;
  uint32 round_idx = 2;
  uint32 kickoff_idx = 3;
  repeated uint32 variant_indices = 4;
}

enum GrpcInputType {
  GRPC_INPUT_UNKNOWN = 0;
  KICKOFF_ROUND = 1;
  MOVE_TO_VAULT_DEPOSIT_OUTPOINT = 2;
  EMERGENCY_STOP_DEPOSIT_IN_MOVE = 3;
  YIELD_KICKOFF_TXID_MARKER = 4;
  WATCHTOWER_CHALLENGE_KICKOFF = 5;
  READY_TO_REIMBURSE_COLLATERAL_IN_ROUND = 6;
  UNSPENT_KICKOFF_COLLATERAL_IN_READY_TO_REIMBURSE = 7;
  UNSPENT_KICKOFF_KICKOFF = 8;
  OPERATOR_CHALLENGE_ACK_WATCHTOWER_CHALLENGE_ACK = 9;
  WATCHTOWER_CHALLENGE_TIMEOUT_WATCHTOWER_CHALLENGE = 10;
  WATCHTOWER_CHALLENGE_TIMEOUT_WATCHTOWER_CHALLENGE_ACK = 11;
  OPERATOR_CHALLENGE_NACK_WATCHTOWER_CHALLENGE_ACK = 12;
  OPERATOR_CHALLENGE_NACK_KICKOFF_FINALIZER = 13;
  OPERATOR_CHALLENGE_NACK_COLLATERAL_IN_ROUND = 14;
  CHALLENGE_TIMEOUT_CHALLENGE = 15;
  CHALLENGE_TIMEOUT_KICKOFF_FINALIZER = 16;
  KICKOFF_NOT_FINALIZED_KICKOFF_FINALIZER = 17;
  KICKOFF_NOT_FINALIZED_COLLATERAL_IN_READY_TO_REIMBURSE = 18;
  DISPROVE_TIMEOUT_DISPROVE = 19;
  DISPROVE_TIMEOUT_KICKOFF_FINALIZER = 20;
  LATEST_BLOCKHASH_TIMEOUT_LATEST_BLOCKHASH = 21;
  LATEST_BLOCKHASH_TIMEOUT_KICKOFF_FINALIZER = 22;
  LATEST_BLOCKHASH_TIMEOUT_COLLATERAL_IN_ROUND = 23;
  LATEST_BLOCKHASH_LATEST_BLOCKHASH = 24;
  MINI_ASSERT_ASSERT = 25;
  ASSERT_TIMEOUT_ASSERT = 26;
  ASSERT_TIMEOUT_KICKOFF_FINALIZER = 27;
  ASSERT_TIMEOUT_COLLATERAL_IN_ROUND = 28;
  DISPROVE_DISPROVE = 29;
  DISPROVE_COLLATERAL_IN_ROUND = 30;
  CHALLENGE_CHALLENGE = 31;
  REIMBURSE_DEPOSIT_IN_MOVE = 32;
  REIMBURSE_REIMBURSE_IN_KICKOFF = 33;
  REIMBURSE_REIMBURSE_IN_ROUND = 34;
  PAYOUT_WITHDRAWAL_UTXO = 35;
  OPTIMISTIC_PAYOUT_WITHDRAWAL_UTXO = 36;
  OPTIMISTIC_PAYOUT_DEPOSIT_IN_MOVE = 37;
  REPLACEMENT_DEPOSIT_OUTPOINT = 38;
  BURN_UNUSED_KICKOFF_CONNECTORS_UNUSED_KICKOFF = 39;
}

message GrpcInputId {
  GrpcInputType input_type = 1;
  repeated uint32 variant_indices = 2;
}

// A tagged signature identifies the exact transaction input it belongs to.
message TaggedSignature {
  reserved 1, 2;
  bytes signature = 3;
  TransactionId tx_id = 4;
  GrpcInputId input_id = 5;
}

message KickoffId {
  bytes operator_xonly_pk = 1;
  uint32 round_idx = 2;
  uint32 kickoff_idx = 3;
}

message TransactionRequest {
  Outpoint deposit_outpoint = 1;
  KickoffId kickoff_id = 2;
}

// Includes the deposit params and the nonce gen initial responses (pubkeys and
// their signatures from all verifiers)
message DepositSignSession {
  DepositParams deposit_params = 1;
  repeated NonceGenFirstResponse nonce_gen_first_responses = 2;
}

// Operator --------------------------------------------------------------------

message OperatorConfig {
  Outpoint collateral_funding_outpoint = 1;
  string xonly_pk = 2;
  string wallet_reimburse_address = 3;
}

message OperatorParams {
  oneof response {
    // Operator's configuration.
    OperatorConfig operator_details = 1;
    // Winternitz pubkeys for each kickoff utxo (to commit blockhash).
    WinternitzPubkey winternitz_pubkeys = 2;
    // unspent kickoff signatures
    SchnorrSig unspent_kickoff_sig = 3;
  }
}

message OperatorKeysWithDeposit {
  OperatorKeys operator_keys = 1;
  DepositParams deposit_params = 2;
  bytes operator_xonly_pk = 3;
}

message OperatorKeys {
  // Winternitz pubkeys for each bitvm assert tx.
  repeated WinternitzPubkey winternitz_pubkeys = 1;
  // Hashes of preimages that will be used to ACK watchtower challenges.
  repeated ChallengeACKDigest challenge_ack_digests = 2;
}

message SchnorrSig { bytes schnorr_sig = 1; }

message WithdrawParams {
  // The ID of the withdrawal in Citrea
  uint32 withdrawal_id = 1;
  // User's [`bitcoin::sighash::TapSighashType::SinglePlusAnyoneCanPay`]
  // signature
  bytes input_signature = 2;
  // User's UTXO to claim the deposit
  Outpoint input_outpoint = 3;
  // The withdrawal output's script_pubkey (user's signature is only valid for
  // this pubkey)
  bytes output_script_pubkey = 4;
  // The withdrawal output's amount (user's signature is only valid for this
  // amount)
  uint64 output_amount = 5;
}

message FinalizedPayoutParams {
  bytes payout_blockhash = 1;
  Outpoint deposit_outpoint = 2;
}

message XOnlyPublicKeyRpc { bytes xonly_public_key = 1; }

message StoppedTasks { repeated string stopped_tasks = 1; }

message EntityError { string error = 1; }

message EntityStatus {
  bool automation = 1;
  optional string wallet_balance = 2;
  optional uint32 tx_sender_synced_height = 3;
  optional uint32 finalized_synced_height = 4;
  optional uint32 hcp_last_proven_height = 5;
  StoppedTasks stopped_tasks = 6;
  optional uint32 rpc_tip_height = 7;
  optional uint32 bitcoin_syncer_synced_height = 8;
  optional uint32 state_manager_next_height = 9;
  optional uint64 btc_fee_rate_sat_vb = 10;
  optional uint32 citrea_l2_block_height = 11;
  optional uint32 lcp_synced_height = 12;
}

enum EntityType {
  ENTITY_UNKNOWN = 0;
  OPERATOR = 1;
  VERIFIER = 2;
  AGGREGATOR = 3;
}

message EntityId {
  EntityType kind = 1;
  string id = 2;
}

message EntityStatusWithId {
  EntityId entity_id = 1;
  oneof status_result {
    EntityStatus status = 2;
    EntityError err = 3;
  }
}

// Parameters related to protocol configuration that can affect contract
// transactions, Citrea syncing, and version compatibility. This must not
// include sensitive information.
message CompatibilityParamsRPC {
  // Protocol paramset in JSON format
  string protocol_paramset = 1;
  string security_council = 2;
  uint32 citrea_chain_id = 3;
  string clementine_version = 4;
  bytes bridge_circuit_constant = 5;
  bytes sha256_bitvm_cache = 6;
}

message EntityDataWithId {
  EntityId entity_id = 1;
  oneof data_result {
    CompatibilityParamsRPC data = 2;
    string error = 3;
  }
}

message EntitiesCompatibilityData {
  repeated EntityDataWithId entities_compatibility_data = 1;
}

message EntityStatuses { repeated EntityStatusWithId entity_statuses = 1; }

// An operator is responsible for paying withdrawals. It has an unique ID and
// chain of UTXOs named `round_txs`. An operator also runs a verifier. These are
// connected to the same database and both have access to watchtowers'
// winternitz pubkeys.
service ClementineOperator {
  // Returns the operator's xonly public key
  //
  // Used by aggregator inside setup
  rpc GetXOnlyPublicKey(Empty) returns (XOnlyPublicKeyRpc) {}

  // Returns the protocol params that can affect the transactions in the
  // contract, syncing with citrea and version number for checking compatibility
  rpc GetCompatibilityParams(Empty) returns (CompatibilityParamsRPC) {}

  // Returns an operator's parameters. It will be called once, by the
  // aggregator, to set all the public keys.
  //
  // # Returns
  //
  // Returns an [`OperatorParams`], which includes operator's configuration and
  // Watchtower parameters.
  //
  // Used by aggregator inside setup
  rpc GetParams(Empty) returns (stream OperatorParams) {}

  // Returns an operator's deposit keys.
  // Deposit keys include Assert BitVM winternitz keys, and challenge ACK
  // hashes.
  //
  // Used by aggregator inside new_deposit
  rpc GetDepositKeys(DepositParams) returns (OperatorKeys) {}

  // Returns the current status of tasks running on the operator and their last
  // synced heights.
  rpc GetCurrentStatus(Empty) returns (EntityStatus) {}

  // Sends the given outpoints to the operator's btc wallet.
  // The transaction will also be broadcasted to the network.
  // Each outpoint must pay to the operator's taproot address (xonly key, no
  // merkle root). The rpc also checks if any outpoint is the collateral of the
  // operator, and rejects the request if so. # Parameters
  // - outpoints: The outpoints to send to the operator's btc wallet
  // # Returns
  // - Raw signed tx that transfers the given outpoints to the operator's btc
  // wallet address
  rpc TransferToBtcWallet(Outpoints) returns (RawSignedTx) {}

  // Signs everything that includes Operator's burn connector.
  //
  // # Parameters
  //
  // - User's deposit information
  // - Nonce metadata
  //
  // # Returns
  //
  // - Operator burn Schnorr signature
  rpc DepositSign(DepositSignSession) returns (stream SchnorrSig) {}

  // Restarts the background tasks for the operator.
  rpc RestartBackgroundTasks(Empty) returns (Empty) {}

  // Prepares a withdrawal if it's profitable and the withdrawal is correct and
  // registered in Citrea bridge contract. If withdrawal is accepted, the payout
  // tx will be added to the TxSender and success is returned, otherwise an
  // error is returned. If automation is disabled, the withdrawal will not be
  // accepted and an error will be returned. Note: This is intended for
  // operator's own use, so it doesn't include a signature from aggregator.
  rpc InternalWithdraw(WithdrawParams) returns (RawSignedTx) {}

  // First, if verification address in operator's config is set, the signature
  // in rpc is checked to see if it was signed by the verification address. Then
  // prepares a withdrawal if it's profitable and the withdrawal is correct and
  // registered in Citrea bridge contract. If withdrawal is accepted, the payout
  // tx will be added to the TxSender and success is returned, otherwise an
  // error is returned. If automation is disabled, the withdrawal will not be
  // accepted and an error will be returned.
  rpc Withdraw(WithdrawParamsWithSig) returns (RawSignedTx) {}

  // For a given deposit outpoint, determines the next step in the kickoff
  // process the operator is in, and returns the raw signed txs that the
  // operator needs to send next, for enabling reimbursement process without
  // automation.
  //
  // # Parameters
  // - deposit_outpoint: Deposit outpoint to create the kickoff for
  //
  // # Returns
  // - Raw signed txs that the operator needs to send next
  rpc GetReimbursementTxs(Outpoint) returns (SignedTxsWithType) {}

  // Signs all tx's it can according to given transaction type (use it with
  // AllNeededForDeposit to get almost all tx's) Creates the transactions
  // denoted by the deposit and operator_idx, round_idx, and kickoff_idx. It
  // will create the transaction and sign it with the operator's private key
  // and/or saved nofn signatures.
  //
  // # Parameters
  // - deposit_params: User's deposit information
  // - transaction_type: Requested Transaction type
  // - kickoff_id: Operator's kickoff ID
  //
  // # Returns
  // - Raw signed transactions that the entity can sign (no asserts and
  // watchtower challenge)
  //
  // Only used in tests
  rpc InternalCreateSignedTxs(TransactionRequest) returns (SignedTxsWithType) {}

  // Creates all assert transactions (AssertBegin, MiniAsserts, AssertEnd),
  // signs them, and returns the raw txs in the same order. # Parameters
  // - deposit_params: User's deposit information
  // - kickoff_id: Operator's kickoff ID
  // - commit_data: Commitment data for each MiniAssert tx's
  //
  // # Returns
  // - Raw signed assert transactions
  rpc InternalCreateAssertCommitmentTxs(TransactionRequest)
      returns (SignedTxsWithType) {}

  rpc InternalFinalizedPayout(FinalizedPayoutParams) returns (Txid) {}

  rpc InternalEndRound(Empty) returns (Empty) {}

  rpc Vergen(Empty) returns (VergenResponse) {}
}

// Verifier --------------------------------------------------------------------

message VerifierParams { bytes public_key = 1; }

message PartialSig { bytes partial_sig = 1; }

message NonceGenRequest { uint32 num_nonces = 1; }

message NonceGenFirstResponse {
  // ID of the nonce session (used to store nonces in verifier's memory)
  // The id is string representation of a u128 number
  string id = 1;
  // Number of nonces to generate
  uint32 num_nonces = 2;
}
message NonceGenResponse {
  oneof response {
    NonceGenFirstResponse first_response = 1;
    bytes pub_nonce = 2;
  }
}

message OptimisticWithdrawParams {
  WithdrawParams withdrawal = 1;
  // An ECDSA signature (of citrea/aggregator) over the withdrawal params
  // to authenticate the withdrawal params. This will be signed manually by
  // citrea after manual verification of the optimistic payout.
  optional string verification_signature = 2;
}

message WithdrawParamsWithSig {
  WithdrawParams withdrawal = 1;
  // An ECDSA signature (of citrea/aggregator) over the withdrawal params
  // to authenticate the withdrawal params. This will be signed manually by
  // citrea after manual verification of the optimistic payout. This message
  // contains same data as the one in Optimistic Payout signature, but with a
  // different message name, so that the same signature can't be used for both
  // optimistic payout and normal withdrawal.
  optional string verification_signature = 2;
}

// Input of the aggregator's withdraw function.
// It contains the withdrawal params along with the verification signature that
// signs the withdrawal params. It also contains the operator's xonly public
// keys that the withdrawal request should be sent to. If the list is empty, the
// withdrawal will be sent to all operators.
message AggregatorWithdrawalInput {
  WithdrawParamsWithSig withdrawal = 1;
  repeated XOnlyPublicKeyRpc operator_xonly_pks = 2;
}

message OptimisticPayoutParams {
  OptimisticWithdrawParams opt_withdrawal = 1;
  NonceGenFirstResponse nonce_gen = 2;
  bytes agg_nonce = 3;
}

message VerifierDepositSignParams {
  oneof params {
    DepositSignSession deposit_sign_first_param = 1;
    bytes agg_nonce = 2;
  }
}

message VerifierDepositFinalizeParams {
  oneof params {
    DepositSignSession deposit_sign_first_param = 1;
    bytes schnorr_sig = 2;
    bytes move_tx_agg_nonce = 3;
    bytes emergency_stop_agg_nonce = 4;
  }
}

message VerifierDepositFinalizeResponse {
  bytes move_to_vault_partial_sig = 1;
  bytes emergency_stop_partial_sig = 2;
}

message VerifierPublicKeys { repeated bytes verifier_public_keys = 1; }

message TxDebugRequest { uint32 tx_id = 1; }

message TxDebugSubmissionError {
  string error_message = 1;
  string timestamp = 2;
}

message TxDebugFeePayerUtxo {
  Txid txid = 1;
  uint32 vout = 2;
  uint64 amount = 3;
  bool confirmed = 4;
}

message TxMetadata {
  // Optional outpoint of the deposit transaction
  Outpoint deposit_outpoint = 1;
  // Deposit identification
  XOnlyPublicKeyRpc operator_xonly_pk = 2;
  uint32 round_idx = 4;
  uint32 kickoff_idx = 5;
  // Transaction ID
  TransactionId tx_type = 6;
}

message TxDebugInfo {
  uint32 id = 1;
  bool is_active = 2;
  string current_state = 3;
  repeated TxDebugSubmissionError submission_errors = 4;
  repeated TxDebugFeePayerUtxo fee_payer_utxos = 5;
  string created_at = 6;
  Txid txid = 7;
  string fee_paying_type = 8;
  uint32 fee_payer_utxos_count = 9;
  uint32 fee_payer_utxos_confirmed_count = 10;
  bytes raw_tx = 11;
  TxMetadata metadata = 12;
}

message XOnlyPublicKeys { repeated bytes xonly_public_keys = 1; }

message VergenResponse { string response = 1; }

service ClementineVerifier {
  // Returns verifiers' metadata. Needs to be called once per setup.
  //
  // Used by aggregator inside setup to let all verifiers know all other
  // verifier pks
  rpc GetParams(Empty) returns (VerifierParams) {}

  // Returns the protocol params that can affect the transactions in the
  // contract, syncing with citrea and version number for checking compatibility
  rpc GetCompatibilityParams(Empty) returns (CompatibilityParamsRPC) {}

  // Saves an operator.
  //
  // Used by aggregator inside setup to let all verifiers know all other
  // operator pks
  rpc SetOperator(stream OperatorParams) returns (Empty) {}

  // Sets the operator's winternitz keys and challenge ACK hashes and saves them
  // into the db.
  //
  // Used by aggregator inside new_deposit to let all verifiers know all other
  // operators' deposit information
  rpc SetOperatorKeys(OperatorKeysWithDeposit) returns (Empty) {}

  // Generates nonces for a deposit.
  //
  // # Returns
  //
  // Nonce metadata followed by nonces.
  //
  // Used by aggregator inside new_deposit
  rpc NonceGen(NonceGenRequest) returns (stream NonceGenResponse) {}

  // Signs deposit with given aggNonces and verifier's secNonce using
  // nonce_id.
  //
  // Used by aggregator inside new_deposit
  rpc DepositSign(stream VerifierDepositSignParams)
      returns (stream PartialSig) {}

  // Signs the optimistic payout tx with given aggNonce and withdrawal info.
  rpc OptimisticPayoutSign(OptimisticPayoutParams) returns (PartialSig) {}

  // Verifies every signature and signs move_tx.
  //
  // Used by aggregator inside new_deposit
  rpc DepositFinalize(stream VerifierDepositFinalizeParams)
      returns (VerifierDepositFinalizeResponse) {}

  // Debug a transaction by retrieving its current state and history
  rpc DebugTx(TxDebugRequest) returns (TxDebugInfo) {}

  // Restarts the background tasks for the verifier.
  rpc RestartBackgroundTasks(Empty) returns (Empty) {}

  // Checks if the kickoff tx is malicious, and logs if it is. Additionally, on
  // networks other than mainnet and testnet4, it will send the challenge tx.
  rpc InternalHandleKickoff(Txid) returns (Empty) {}

  // Returns the current status of tasks running on the verifier and their last
  // synced heights.
  rpc GetCurrentStatus(Empty) returns (EntityStatus) {}

  // 1. Signs all tx's it can according to given transaction type (use it with
  // AllNeededForDeposit to get almost all tx's)
  // 2. Creates the transactions denoted by the deposit and operator_idx,
  // round_idx, and kickoff_idx.
  // 3. It will create the transaction and sign it with the operator's private
  // key and/or saved nofn signatures.
  //
  // # Parameters
  // - deposit_params: User's deposit information
  // - transaction_type: Requested Transaction type
  // - kickoff_id: Operator's kickoff ID
  //
  // # Returns
  // - Raw signed transactions that the entity can sign (no asserts and
  // watchtower challenge)
  rpc InternalCreateSignedTxs(TransactionRequest) returns (SignedTxsWithType) {}

  // Signs the verifiers own watchtower challenge tx in the corresponding
  // kickoff and returns the signed raw tx
  rpc InternalCreateWatchtowerChallenge(TransactionRequest)
      returns (RawTxWithRbfInfo) {}

  rpc Vergen(Empty) returns (VergenResponse) {}
}

// Aggregator ------------------------------------------------------------------

message RawSignedTx { bytes raw_tx = 1; }

message SendTxRequest {
  RawSignedTx raw_tx = 1;
  FeeType fee_type = 2;
}

message RawSignedTxs { repeated RawSignedTx raw_txs = 1; }

message SignedTxWithType {
  TransactionId transaction_type = 1;
  bytes raw_tx = 2;
}

message SignedTxsWithType { repeated SignedTxWithType signed_txs = 1; }

message RbfSigningKeyPathRpc {
  // Key path spend tweak merkle root (optional).
  bytes merkle_root = 1;
}

message RbfSigningScriptPathRpc {
  bytes control_block = 1;
  bytes script = 2;
}

message RbfSigningInfoRpc {
  uint32 vout = 1;
  oneof spend_path {
    RbfSigningKeyPathRpc key_path = 2;
    RbfSigningScriptPathRpc script_path = 3;
  }
  // Taproot sighash type as raw byte.
  uint32 tap_sighash_type = 4;
}

message RawTxWithRbfInfo {
  bytes raw_tx = 1;
  RbfSigningInfoRpc rbf_info = 2;
}

message OperatorWithrawalResponse {
  XOnlyPublicKeyRpc operator_xonly_pk = 1;
  oneof response {
    RawSignedTx raw_tx = 2;
    string error = 3;
  }
}

message AggregatorWithdrawResponse {
  repeated OperatorWithrawalResponse withdraw_responses = 1;
}

message GetEmergencyStopTxRequest { repeated Txid txids = 1; }

message GetEmergencyStopTxResponse {
  repeated Txid txids = 1;
  repeated bytes encrypted_emergency_stop_txs = 2;
}

message SendMoveTxRequest {
  RawSignedTx raw_tx = 1;
  Outpoint deposit_outpoint = 2;
}

message GetEntityStatusesRequest { bool restart_tasks = 1; }

service ClementineAggregator {
  rpc GetNofnAggregatedXonlyPk(Empty) returns (NofnResponse) {}

  // Returns the compatibility data from all entities
  rpc GetCompatibilityDataFromEntities(Empty)
      returns (EntitiesCompatibilityData) {}

  // Returns the protocol params that can affect the transactions in the
  // contract, syncing with citrea and version number for checking compatibility
  rpc GetCompatibilityParams(Empty) returns (CompatibilityParamsRPC) {}

  // Sets up the system of verifiers, watchtowers and operators by:
  //
  // 1. Collects verifier keys from each verifier
  // 2. Distributes these verifier keys to all verifiers
  // 3. Collects all operator configs from each operator
  // 4. Distributes these operator configs to all verifiers
  //
  // Used by the clementine-backend service
  rpc Setup(Empty) returns (VerifierPublicKeys) {}

  // This will call, DepositNonceGen for every verifier,
  // then it will aggregate one by one and then send it to DepositSign,
  // then it will aggregate the partial sigs and send it to DepositFinalize,
  // this will also call the operator to get their signatures and send it to
  // DepositFinalize then it will collect the partial sigs and create the move
  // tx.
  //
  // Used by the clementine-backend service to initiate a deposit
  rpc NewDeposit(Deposit) returns (RawSignedTx) {}

  // Call's withdraw on all operators
  // Used by the clementine-backend service to initiate a withdrawal
  // If the operator's xonly public keys list is empty, the withdrawal will be
  // sent to all operators. If not, only the operators in the list will be sent
  // the withdrawal request.
  rpc Withdraw(AggregatorWithdrawalInput) returns (AggregatorWithdrawResponse) {
  }

  // Perform an optimistic payout to reimburse a peg-out from Citrea
  rpc OptimisticPayout(OptimisticWithdrawParams) returns (RawSignedTx) {}

  // Send a pre-signed tx to the network
  rpc InternalSendTx(SendTxRequest) returns (Empty) {}

  rpc SendMoveToVaultTx(SendMoveTxRequest) returns (Txid) {}

  // Returns the current status of tasks running on the operators/verifiers.
  // If restart_tasks is true, it will restart the tasks on the entities if they
  // are stopped.
  rpc GetEntityStatuses(GetEntityStatusesRequest) returns (EntityStatuses) {}

  // Creates an emergency stop tx that won't be broadcasted.
  // Tx will have around 3 sats/vbyte fee.
  // Set add_anchor to true to add an anchor output for cpfp..
  rpc InternalGetEmergencyStopTx(GetEmergencyStopTxRequest)
      returns (GetEmergencyStopTxResponse) {}

  rpc Vergen(Empty) returns (VergenResponse) {}
}
